<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:linear-gradient(180deg,#f3f6fb 0,#eef2f8 100%);color:#172033}.wrap{max-width:1080px;margin:0 auto;padding:24px 16px 48px}header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}h1{font-size:30px;margin:0 0 6px}.sub{margin:0;color:#667085;line-height:1.6}.actions{display:flex;gap:10px;flex-wrap:wrap}button{appearance:none;border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;background:#e8eefb;color:#1e3478;font-size:15px}button.primary{background:#2947a9;color:#fff}button.danger{background:#fff1ef;color:#a32929;border:1px solid #f4c7c1}button.ghost{background:#fff;border:1px solid #d9e1ef;color:#172033}button:disabled{opacity:.55;cursor:not-allowed}.panel{background:#fff;border:1px solid #d9e1ef;border-radius:22px;padding:20px;box-shadow:0 12px 30px rgba(22,34,66,.08);margin-bottom:16px}.stats{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:12px}.stat{background:#f0f3fb;border-radius:16px;padding:12px 14px}.stat span{display:block;color:#667085;font-size:13px}.stat b{font-size:24px}.tabs{display:flex;gap:8px;margin:12px 0 16px;position:sticky;top:0;background:#eef2f8;padding:8px 0;z-index:2}.tab.active{background:#172033;color:#fff}.hidden{display:none!important}.q{border-top:1px solid #e4e9f2;padding-top:18px;margin-top:18px}.q:first-child{border-top:0;padding-top:0;margin-top:0}.meta{color:#667085;margin-bottom:8px}.sentence{font-size:18px;line-height:1.75;margin:8px 0 12px}.choice{display:block;width:100%;text-align:left;background:#fff;border:1px solid #d9e1ef;color:#172033;margin:8px 0;padding:13px 16px}.choice.selected{background:#edf2ff;border-color:#2947a9}.choice.correct{background:#e9f7f0;border-color:#0f7b50;color:#0f7b50}.choice.wrong{background:#fff0ee;border-color:#b42318;color:#b42318}.explain{display:none;border-left:4px solid #d9e1ef;padding:10px 12px;background:#f8fafc;color:#475467;border-radius:10px;margin-top:10px;line-height:1.6}.explain.show{display:block}.flash{min-height:310px;display:grid;place-items:center;text-align:center;cursor:pointer;user-select:none;border:1px solid #e4e9f2;border-radius:20px;background:linear-gradient(180deg,#fff,#f8fafc)}.flash h2{font-size:44px;margin:4px}.flash .meaning{font-size:22px;font-weight:800;margin:12px}.progress{height:10px;background:#e8eefb;border-radius:999px;overflow:hidden;margin-top:12px}.bar{height:100%;background:#2947a9;width:0}.wordgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.word{border:1px solid #d9e1ef;border-radius:16px;padding:14px;background:#fff}.word b{font-size:18px}input,textarea{width:100%;max-width:460px;padding:12px 14px;border:1px solid #d9e1ef;border-radius:14px;font-size:16px}.small{font-size:13px;color:#667085}.pill{display:inline-block;border-radius:999px;background:#edf2ff;color:#1e3478;font-size:12px;font-weight:800;padding:4px 8px;margin-right:6px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#172033;color:#fff;padding:12px 16px;border-radius:999px;box-shadow:0 12px 30px rgba(0,0,0,.2);display:none;z-index:10}.toast.show{display:block}@media(max-width:760px){.wrap{padding:18px 12px 40px}header{display:block}.actions{margin-top:14px}.stats{grid-template-columns:repeat(2,1fr)}h1{font-size:26px}.flash h2{font-size:36px}.tabs{overflow:auto}.sentence{font-size:17px}button{min-height:44px}}

<body>
<div class="wrap">
<header>
  <div><h1>英検1級 単語学習アプリ</h1><p class="sub">毎日10問の空欄補充4択クイズ＋当日単語のフラッシュカード。苦手語を優先して復習します。</p></div>
  <div class="actions"><button id="todayBtn" class="primary">今日の10問</button><button id="regenBtn">再生成</button><button id="resetBtn" class="danger">履歴リセット</button></div>
</header>
<section class="panel">
  <div class="stats">
    <div class="stat"><span>Today's score</span><b id="score">0/10</b></div>
    <div class="stat"><span>Study days</span><b id="days">0</b></div>
    <div class="stat"><span>Known words</span><b id="known">0</b></div>
    <div class="stat"><span>Due today</span><b id="due">0</b></div>
  </div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <p id="status" class="small">読み込み中です。</p>
</section>
<nav class="tabs"><button class="tab active" data-tab="quiz">Quiz</button><button class="tab" data-tab="cards">Flashcards</button><button class="tab" data-tab="words">Word List</button><button class="tab" data-tab="data">Data</button></nav>
<section id="quiz" class="panel tabPanel"><div id="quizBox"></div><div class="actions" style="margin-top:16px"><button id="gradeBtn" class="primary">採点する</button><button id="answerBtn">解説を表示</button></div></section>
<section id="cards" class="panel tabPanel hidden"><div id="flash" class="flash"><div><p class="small">FLASHCARD</p><h2 id="cardWord">---</h2><p id="cardPron" class="small"></p><p id="cardMean" class="meaning hidden"></p><p id="cardHint" class="small">タップで意味を表示</p></div></div><div class="actions" style="justify-content:center;margin-top:14px"><button id="prevBtn">前へ</button><button id="hardBtn" class="ghost">まだ</button><button id="goodBtn" class="primary">覚えた</button><button id="nextBtn">次へ</button></div><p id="counter" class="small" style="text-align:center"></p></section>
<section id="words" class="panel tabPanel hidden"><input id="search" type="search" placeholder="単語・意味で検索"><div id="wordBox" class="wordgrid" style="margin-top:14px"></div></section>
<section id="data" class="panel tabPanel hidden"><h2>学習データ</h2><p class="small">端末の localStorage に保存されます。iPhoneとPCでは別データです。</p><div class="actions"><button id="exportBtn">データを書き出し</button><button id="copyBtn">コピー</button></div><textarea id="dataBox" rows="8" placeholder="ここに学習データが表示されます" style="margin-top:12px"></textarea></section>
</div><div id="toast" class="toast"></div>

var WORDS=[

{w:'acrimonious',p:'/ˌækrɪˈmoʊniəs/',m:'辛辣な、とげとげしい',j:'議論・関係などが険悪で攻撃的な様子。',s:'The negotiations became increasingly ____ after both sides refused to compromise.',o:['acrimonious','affluent','pliable','benign'],e:'refused to compromise なので「険悪な」が自然。'},
{w:'anomaly',p:'/əˈnɑːməli/',m:'異例、例外的事象',j:'規則・傾向から外れるもの。',s:'Researchers noticed an ____ in the data that could not be explained by the current model.',o:['anomaly','edict','overture','conduit'],e:'data/model と結びつき「説明できない異常値」。'},
{w:'assuage',p:'/əˈsweɪdʒ/',m:'和らげる、鎮める',j:'不安・怒り・痛みなどを軽減する。',s:'The mayor tried to ____ public fears by releasing detailed safety information.',o:['assuage','exacerbate','deplete','repudiate'],e:'assuage public fears で「不安を和らげる」。'},
{w:'austere',p:'/ɔːˈstɪr/',m:'質素な、厳格な',j:'装飾が少ない、規律が厳しい。',s:'The monastery was known for its ____ lifestyle and simple architecture.',o:['austere','lavish','erratic','flagrant'],e:'monastery, simple architecture から「質素な」。'},
{w:'belligerent',p:'/bəˈlɪdʒərənt/',m:'好戦的な、攻撃的な',j:'敵対的で争いを起こしやすい態度。',s:'His ____ tone made a calm discussion almost impossible.',o:['belligerent','conciliatory','lucid','frugal'],e:'calm discussion impossible なので攻撃的な tone。'},

{w:'concede',p:'/kənˈsiːd/',m:'認める、譲歩する',j:'不本意ながら事実・敗北・要求を認める。',s:'Although she defended the policy, she had to ____ that implementation had been poor.',o:['concede','reiterate','obfuscate','prescribe'],e:'不備を「認める」が合う。'},

{w:'deleterious',p:'/ˌdeləˈtɪriəs/',m:'有害な',j:'健康・社会・制度などに悪影響を及ぼす。',s:'Prolonged sleep deprivation has ____ effects on cognitive performance.',o:['deleterious','salutary','negligible','impartial'],e:'sleep deprivation の effects は「有害な」。'},
{w:'disparage',p:'/dɪˈspærɪdʒ/',m:'けなす、見くびる',j:'価値を低く言う。',s:'The candidate was criticized for trying to ____ his opponent’s achievements.',o:['disparage','validate','magnify','champion'],e:'opponent’s achievements を「けなす」。'},
{w:'elicit',p:'/iˈlɪsɪt/',m:'引き出す',j:'反応・情報・答えを相手から引き出す。',s:'The documentary managed to ____ sympathy from viewers.',o:['elicit','suppress','allocate','forfeit'],e:'elicit sympathy で「同情を引き出す」。'},
{w:'emulate',p:'/ˈemjuleɪt/',m:'見習う、まねる',j:'優れた人・方法を手本として追随する。',s:'Younger firms attempted to ____ the company’s successful subscription model.',o:['emulate','deride','impede','nullify'],e:'successful model を「見習う・模倣する」。'},
{w:'ephemeral',p:'/ɪˈfemərəl/',m:'短命の、束の間の',j:'長く続かない。',s:'The popularity of many online trends is surprisingly ____.',o:['ephemeral','perpetual','onerous','coherent'],e:'online trends の人気は「一時的」。'},
{w:'exacerbate',p:'/ɪɡˈzæsərbeɪt/',m:'悪化させる',j:'問題・病状・対立をさらに悪くする。',s:'Rising fuel prices may ____ inflationary pressure across the economy.',o:['exacerbate','mitigate','rectify','endorse'],e:'fuel prices が inflationary pressure を悪化させる。'},
{w:'fastidious',p:'/fæˈstɪdiəs/',m:'非常に几帳面な、好みのうるさい',j:'細部や品質に過度に注意する。',s:'The editor was so ____ that even minor punctuation errors bothered her.',o:['fastidious','indifferent','boisterous','destitute'],e:'minor errors bothered her なので細部にうるさい。'},
{w:'galvanize',p:'/ˈɡælvənaɪz/',m:'奮起させる、活性化する',j:'人々を刺激して行動させる。',s:'The crisis helped ____ citizens into volunteering for relief efforts.',o:['galvanize','dissuade','alienate','encumber'],e:'galvanize A into doing で「Aを奮起させて〜させる」。'},
{w:'intransigent',p:'/ɪnˈtrænzɪdʒənt/',m:'妥協しない、強硬な',j:'立場を変えず譲歩しない。',s:'The talks collapsed because both parties remained ____.',o:['intransigent','amenable','candid','sporadic'],e:'talks collapsed なので「妥協しない」。'},
{w:'laconic',p:'/ləˈkɑːnɪk/',m:'簡潔な、口数の少ない',j:'少ない言葉で表現する。',s:'His ____ reply consisted of only two words: “Not approved.”',o:['laconic','verbose','haphazard','opulent'],e:'only two words が手がかり。'},
{w:'mitigate',p:'/ˈmɪtɪɡeɪt/',m:'軽減する、緩和する',j:'被害・リスク・悪影響を小さくする。',s:'The city planted trees to ____ the impact of extreme heat.',o:['mitigate','intensify','derail','provoke'],e:'impact of heat を小さくする。'},
{w:'obdurate',p:'/ˈɑːbdərət/',m:'頑固な、強情な',j:'説得されても考えを変えない。',s:'Despite overwhelming evidence, the board remained ____ in its refusal to change course.',o:['obdurate','pliable','tentative','cordial'],e:'refusal to change course から頑固。'},
{w:'perfunctory',p:'/pərˈfʌŋktəri/',m:'おざなりの、形式的な',j:'義務的で熱意や注意がない。',s:'The manager gave a ____ apology that satisfied no one.',o:['perfunctory','heartfelt','meticulous','radiant'],e:'satisfied no one なので「おざなりの謝罪」。'},
{w:'proliferate',p:'/prəˈlɪfəreɪt/',m:'急増する、拡散する',j:'数や種類が急速に増える。',s:'Misinformation can ____ rapidly on social media platforms.',o:['proliferate','abate','stagnate','subside'],e:'rapidly on social media なので「拡散する」。'},
{w:'recalcitrant',p:'/rɪˈkælsɪtrənt/',m:'反抗的な、扱いにくい',j:'規則や指示に従おうとしない。',s:'The teacher struggled to manage a ____ student who ignored every instruction.',o:['recalcitrant','compliant','docile','amiable'],e:'ignored every instruction が手がかり。'},
{w:'repudiate',p:'/rɪˈpjuːdieɪt/',m:'拒絶する、否認する',j:'主張・契約・関係などを公式に退ける。',s:'The senator moved quickly to ____ the controversial remarks.',o:['repudiate','endorse','ratify','cherish'],e:'controversial remarks を「否認する」。'},
{w:'resilient',p:'/rɪˈzɪliənt/',m:'回復力のある',j:'困難から立ち直る力がある。',s:'Small businesses proved surprisingly ____ after the natural disaster.',o:['resilient','brittle','lethargic','obsolete'],e:'after disaster でも耐える・回復する。'},
{w:'scrutinize',p:'/ˈskruːtənaɪz/',m:'精査する',j:'細部まで注意深く調べる。',s:'Auditors were asked to ____ the company’s financial records.',o:['scrutinize','neglect','fabricate','appease'],e:'auditors と financial records から「精査」。'},
{w:'tenuous',p:'/ˈtenjuəs/',m:'根拠の薄い、弱い',j:'関係・主張・証拠が弱く不確か。',s:'The link between the policy and the economic recovery remains ____.',o:['tenuous','robust','explicit','inevitable'],e:'link remains tenuous で「関連が弱い」。'},
{w:'ubiquitous',p:'/juːˈbɪkwɪtəs/',m:'至る所にある',j:'どこにでも存在する。',s:'Smartphones have become ____ in modern urban life.',o:['ubiquitous','scarce','archaic','opaque'],e:'modern life でスマホは「遍在する」。'},
{w:'vacillate',p:'/ˈvæsəleɪt/',m:'揺れ動く、迷う',j:'決定や意見が行ったり来たりする。',s:'The committee continued to ____ between two competing proposals.',o:['vacillate','persevere','reconcile','accelerate'],e:'between two proposals なので迷う。'},
{w:'vindicate',p:'/ˈvɪndɪkeɪt/',m:'正当性を証明する',j:'疑いを晴らし正しかったと示す。',s:'The final report seemed to ____ her decision to delay the launch.',o:['vindicate','condemn','belittle','distort'],e:'decision が正しかったと示す。'},
{w:'wary',p:'/ˈweri/',m:'警戒している',j:'危険や問題に用心している。',s:'Consumers are increasingly ____ of companies that collect excessive personal data.',o:['wary','oblivious','elated','reckless'],e:'excessive personal data への警戒。'}
];
var KEY='eiken1_vocab_app_v4';var today=localDate();var state={date:'',questions:[],answers:{},graded:false,score:0,stats:{},days:{},card:0,reveal:false};
function $(id){return document.getElementById(id)}
function localDate(){var d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function load(){try{var raw=localStorage.getItem(KEY);if(raw)state=Object.assign(state,JSON.parse(raw));}catch(e){} if(!state.stats)state.stats={}; if(!state.days)state.days={}; WORDS.forEach(function(x){if(!state.stats[x.w])state.stats[x.w]={seen:0,correct:0,wrong:0,known:false,due:'2000-01-01',level:0}})}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){toast('保存できませんでした')}}
function hash(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}return h>>>0}
function rng(seed){var x=seed||123456789;return function(){x^=x<<13;x^=x>>>17;x^=x<<5;return ((x>>>0)/4294967296)}}
function shuffle(a,seed){var r=rng(seed);a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(r()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function addDays(d,n){var x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}
function schedule(word,ok){var s=state.stats[word];s.seen++; if(ok){s.correct++;s.level=Math.min(5,(s.level||0)+1);var gaps=[1,2,4,7,14,30];s.due=addDays(today,gaps[s.level]||30); if(s.level>=4)s.known=true;}else{s.wrong++;s.level=0;s.known=false;s.due=addDays(today,1)}}
function generate(force){load();today=localDate();if(!force&&state.date===today&&state.questions&&state.questions.length){render();return}state.date=today;state.answers={};state.graded=false;state.score=0;state.card=0;state.reveal=false;state.days[today]=true;var due=WORDS.filter(function(x){var st=state.stats[x.w];return !st.known&&(st.due<=today||st.wrong>0)});var rest=WORDS.filter(function(x){return due.indexOf(x)<0});due.sort(function(a,b){var A=state.stats[a.w],B=state.stats[b.w];return (B.wrong-A.wrong)||(A.level-B.level)||(A.due>B.due?1:-1)});var pool=due.concat(shuffle(rest,hash(today)));state.questions=pool.slice(0,10).map(function(x){return x.w});save();render();toast('今日の10問を作成しました')}
function currentWords(){return (state.questions||[]).map(function(w){return WORDS.find(function(x){return x.w===w})}).filter(Boolean)}
function render(){renderStats();renderQuiz();renderCard();renderWords()}
function renderStats(){var words=currentWords();$('score').textContent=(state.score||0)+'/'+(words.length||10);$('days').textContent=Object.keys(state.days||{}).length;$('known').textContent=Object.keys(state.stats).filter(function(w){return state.stats[w].known}).length;$('due').textContent=WORDS.filter(function(x){return state.stats[x.w].due<=today&&!state.stats[x.w].known}).length;$('bar').style.width=((state.score||0)/10*100)+'%';$('status').textContent=state.date? state.date+' の10問を表示中です。':'「今日の10問」を押してください。'}
function renderQuiz(){var box=$('quizBox'),words=currentWords();if(!words.length){box.innerHTML='<p>「今日の10問」を押してください。</p>';return}box.innerHTML=words.map(function(x,i){var opts=shuffle(x.o,hash(today+x.w));return '<div class="q" data-word="'+x.w+'"><div class="meta">Question '+(i+1)+' / '+x.m+'</div><div class="sentence">'+x.s+'</div>'+opts.map(function(o){var cls='choice'; if(state.answers[x.w]===o)cls+=' selected'; if(state.graded&&o===x.w)cls+=' correct'; if(state.graded&&state.answers[x.w]===o&&o!==x.w)cls+=' wrong'; return '<button class="'+cls+'" data-choice="'+o+'">'+o+'</button>'}).join('')+'<div class="explain '+(state.graded?'show':'')+'"><b>'+x.w+'</b> '+x.p+' / '+x.m+'<br>'+x.j+'<br>'+x.e+'</div></div>'}).join('');box.querySelectorAll('.choice').forEach(function(b){b.addEventListener('click',function(){if(state.graded)return;var q=b.closest('.q');state.answers[q.getAttribute('data-word')]=b.getAttribute('data-choice');save();renderQuiz()})})}
function grade(){var words=currentWords();if(!words.length)return;var score=0;words.forEach(function(x){var ok=state.answers[x.w]===x.w;if(ok)score++;schedule(x.w,ok)});state.score=score;state.graded=true;state.days[today]=true;save();render();toast(score+' / '+words.length+' 点です')}
function showAnswers(){state.graded=true;save();renderQuiz()}
function renderCard(){var words=currentWords();if(!words.length){$('cardWord').textContent='---';$('cardMean').textContent='';$('counter').textContent='';return}if(state.card>=words.length)state.card=0;if(state.card<0)state.card=words.length-1;var x=words[state.card];$('cardWord').textContent=x.w;$('cardPron').textContent=x.p;$('cardMean').textContent=x.m+' / '+x.j;$('cardMean').className=state.reveal?'meaning':'meaning hidden';$('cardHint').textContent=state.reveal?'もう一度タップで単語へ':'タップで意味を表示';$('counter').textContent=(state.card+1)+' / '+words.length}
function next(n){var words=currentWords();if(!words.length)return;state.card=(state.card+n+words.length)%words.length;state.reveal=false;save();renderCard()}
function mark(ok){var words=currentWords();if(!words.length)return;schedule(words[state.card].w,ok);state.reveal=false;save();renderStats();renderWords();next(1);toast(ok?'覚えたにしました':'明日また出します')}
function renderWords(){var q=($('search').value||'').toLowerCase();var arr=WORDS.filter(function(x){return !q||x.w.toLowerCase().includes(q)||x.m.includes(q)||x.j.includes(q)});$('wordBox').innerHTML=arr.map(function(x){var st=state.stats[x.w]||{};return '<div class="word"><b>'+x.w+'</b><div class="small">'+x.p+'</div><p>'+x.m+'</p><p class="small">'+x.j+'</p><span class="pill">正解 '+(st.correct||0)+'</span><span class="pill">誤答 '+(st.wrong||0)+'</span><span class="pill">due '+(st.due||'-')+'</span></div>'}).join('')}
function switchTab(name){document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===name)});document.querySelectorAll('.tabPanel').forEach(function(p){p.classList.toggle('hidden',p.id!==name)});if(name==='data')exportData()}
function exportData(){$('dataBox').value=JSON.stringify({exportedAt:new Date().toISOString(),state:state},null,2)}
function toast(msg){var t=$('toast');t.textContent=msg;t.className='toast show';setTimeout(function(){t.className='toast'},1600)}
function bind(){$('todayBtn').addEventListener('click',function(){generate(false)});$('regenBtn').addEventListener('click',function(){if(confirm('今日の問題を再生成しますか？回答は消えます。'))generate(true)});$('resetBtn').addEventListener('click',function(){if(confirm('学習履歴をすべて削除しますか？')){localStorage.removeItem(KEY);state={date:'',questions:[],answers:{},graded:false,score:0,stats:{},days:{},card:0,reveal:false};load();generate(true)}});$('gradeBtn').addEventListener('click',grade);$('answerBtn').addEventListener('click',showAnswers);$('flash').addEventListener('click',function(){state.reveal=!state.reveal;save();renderCard()});$('prevBtn').addEventListener('click',function(){next(-1)});$('nextBtn').addEventListener('click',function(){next(1)});$('goodBtn').addEventListener('click',function(){mark(true)});$('hardBtn').addEventListener('click',function(){mark(false)});$('search').addEventListener('input',renderWords);$('exportBtn').addEventListener('click',exportData);$('copyBtn').addEventListener('click',function(){exportData();$('dataBox').select();document.execCommand('copy');toast('コピーしました')});document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){switchTab(t.dataset.tab)})})}
function init(){load();bind();if(state.date!==today||!state.questions||!state.questions.length)generate(false);else render()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
