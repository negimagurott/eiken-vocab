.show{display:block}.cardstage{perspective:1200px}.flash{min-height:360px;position:relative;cursor:pointer;user-select:none;transform-style:preserve-3d;transition:transform .55s ease}.flash.flipped{transform:rotateY(180deg)}.face{position:absolute;inset:0;display:grid;place-items:center;text-align:center;border:1px solid #e4e9f2;border-radius:20px;background:linear-gradient(180deg,#fff,#f8fafc);backface-visibility:hidden;padding:24px}.back{transform:rotateY(180deg);text-align:left;place-items:start}.flash h2{font-size:44px;margin:8px 0}.meaning{font-size:22px;font-weight:800;margin:8px 0}.usage{line-height:1.7}.progress{height:10px;background:#e8eefb;border-radius:999px;overflow:hidden;margin-top:12px}.bar{height:100%;background:#2947a9;width:0}.wordgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}.word{border:1px solid #d9e1ef;border-radius:16px;padding:14px;background:#fff}.word b{font-size:18px}input,textarea{width:100%;max-width:460px;padding:12px 14px;border:1px solid #d9e1ef;border-radius:14px;font-size:16px}.pill{display:inline-block;border-radius:999px;background:#edf2ff;color:#1e3478;font-size:12px;font-weight:800;padding:4px 8px;margin-right:6px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#172033;color:#fff;padding:12px 16px;border-radius:999px;box-shadow:0 12px 30px rgba(0,0,0,.2);display:none;z-index:10}.toast.show{display:block}@media(max-width:760px){.wrap{padding:18px 12px 40px}header{display:block}.actions{margin-top:14px}.stats{grid-template-columns:repeat(2,1fr)}h1{font-size:26px}.flash h2{font-size:36px}.tabs{overflow:auto}.sentence{font-size:17px}button{min-height:44px}.speak{min-height:0}.flash{min-height:410px}.back{font-size:15px}}

<div class="wrap">
<header><div><h1>英検1級 単語学習アプリ</h1><p class="sub">毎日10問の空欄補充4択クイズ＋当日単語のフラッシュカード。毎日違う問題が出るよう修正済みです。</p></div><div class="actions"><button id="todayBtn" class="primary">今日の10問</button><button id="regenBtn">再生成</button><button id="resetBtn" class="danger">履歴リセット</button></div></header>

<section id="words" class="panel tabPanel hidden"><input id="search" type="search" placeholder="単語・意味で検索"><div id="wordBox" class="wordgrid" style="margin-top:14px"></div></section>
<section id="data" class="panel tabPanel hidden"><h2>学習データ</h2><p class="small">端末の localStorage に保存されます。</p><div class="actions"><button id="exportBtn">データを書き出し</button><button id="copyBtn">コピー</button></div><textarea id="dataBox" rows="8" style="margin-top:12px"></textarea></section>

<script>
(function(){'use strict';
var WORDS=[
['aberration','/ˌæbəˈreɪʃən/','逸脱、異常','通常期待される状態から外れたもの。','The sudden decline in sales was dismissed as a temporary ____ rather than a long-term trend.',['aberration','allegiance','reverence','deference'],'temporary aberration（一時的な異常）の形でよく使います。'],
['acrimonious','/ˌækrɪˈmoʊniəs/','辛辣な、とげとげしい','議論・関係などが険悪で攻撃的な様子。','The negotiations became increasingly ____ after both sides refused to compromise.',['acrimonious','affluent','pliable','benign'],'acrimonious debate / dispute / negotiations が頻出です。'],
['anomaly','/əˈnɑːməli/','異例、例外的事象','規則・傾向から外れるもの。','Researchers noticed an ____ in the data that could not be explained by the current model.',['anomaly','edict','overture','conduit'],'data, pattern, result などと結びつきます。'],
['assuage','/əˈsweɪdʒ/','和らげる、鎮める','不安・怒り・痛みなどを軽減する。','The mayor tried to ____ public fears by releasing detailed safety information.',['assuage','exacerbate','deplete','repudiate'],'assuage fears / concerns / anger が定番です。'],
['austere','/ɔːˈstɪr/','質素な、厳格な','装飾が少ない、規律が厳しい。','The monastery was known for its ____ lifestyle and simple architecture.',['austere','lavish','erratic','flagrant'],'austere lifestyle / measures / conditions などで使います。'],
['belligerent','/bəˈlɪdʒərənt/','好戦的な、攻撃的な','敵対的で争いを起こしやすい態度。','His ____ tone made a calm discussion almost impossible.',['belligerent','conciliatory','lucid','frugal'],'belligerent tone / attitude / behavior が自然です。'],
['bolster','/ˈboʊlstər/','強化する、支える','制度・主張・信頼などを補強する。','The new evidence helped ____ the prosecution’s argument.',['bolster','undermine','curtail','squander'],'bolster support / confidence / argument の形で使います。'],
['capricious','/kəˈprɪʃəs/','気まぐれな、予測不能な','急に考えや行動が変わる。','Investors were unsettled by the CEO’s ____ decision-making.',['capricious','methodical','staunch','innate'],'decision, behavior, policy などの予測不能性を表します。'],
['censure','/ˈsenʃər/','厳しく非難する','公式・強い調子で批判する。','The committee voted to ____ the official for violating ethics rules.',['censure','commend','emulate','appease'],'officially censure someone のように公式非難で使います。'],
['concede','/kənˈsiːd/','認める、譲歩する','不本意ながら事実・敗北・要求を認める。','Although she defended the policy, she had to ____ that implementation had been poor.',['concede','reiterate','obfuscate','prescribe'],'concede that S V / concede defeat が頻出です。'],
['dearth','/dɜːrθ/','不足、欠乏','必要なものが十分にないこと。','A ____ of qualified engineers delayed the infrastructure project.',['dearth','surfeit','bevy','torrent'],'a dearth of information / talent / evidence の形で使います。'],
['deleterious','/ˌdeləˈtɪriəs/','有害な','健康・社会・制度などに悪影響を及ぼす。','Prolonged sleep deprivation has ____ effects on cognitive performance.',['deleterious','salutary','negligible','impartial'],'deleterious effects on ... が非常に重要な形です。'],
['disparage','/dɪˈspærɪdʒ/','けなす、見くびる','価値を低く言う。','The candidate was criticized for trying to ____ his opponent’s achievements.',['disparage','validate','magnify','champion'],'人や業績を低く言う時に使います。'],
['elicit','/iˈlɪsɪt/','引き出す','反応・情報・答えを相手から引き出す。','The documentary managed to ____ sympathy from viewers.',['elicit','suppress','allocate','forfeit'],'elicit a response / sympathy / information が頻出です。'],
['emulate','/ˈemjuleɪt/','見習う、まねる','優れた人・方法を手本として追随する。','Younger firms attempted to ____ the company’s successful subscription model.',['emulate','deride','impede','nullify'],'成功例を手本にするニュアンスです。'],
['ephemeral','/ɪˈfemərəl/','短命の、束の間の','長く続かない。','The popularity of many online trends is surprisingly ____.',['ephemeral','perpetual','onerous','coherent'],'ephemeral popularity / pleasure / trend で使います。'],
['exacerbate','/ɪɡˈzæsərbeɪt/','悪化させる','問題・病状・対立をさらに悪くする。','Rising fuel prices may ____ inflationary pressure across the economy.',['exacerbate','mitigate','rectify','endorse'],'exacerbate a problem / crisis / tension が定番です。'],
['fastidious','/fæˈstɪdiəs/','非常に几帳面な、好みのうるさい','細部や品質に過度に注意する。','The editor was so ____ that even minor punctuation errors bothered her.',['fastidious','indifferent','boisterous','destitute'],'細部にうるさい人を描写する形容詞です。'],
['galvanize','/ˈɡælvənaɪz/','奮起させる、活性化する','人々を刺激して行動させる。','The crisis helped ____ citizens into volunteering for relief efforts.',['galvanize','dissuade','alienate','encumber'],'galvanize A into doing の形が重要です。'],
['intransigent','/ɪnˈtrænzɪdʒənt/','妥協しない、強硬な','立場を変えず譲歩しない。','The talks collapsed because both parties remained ____.',['intransigent','amenable','candid','sporadic'],'交渉・政治文脈で頻出します。'],
['laconic','/ləˈkɑːnɪk/','簡潔な、口数の少ない','少ない言葉で表現する。','His ____ reply consisted of only two words: “Not approved.”',['laconic','verbose','haphazard','opulent'],'laconic reply / comment / style の形で使います。'],
['mitigate','/ˈmɪtɪɡeɪt/','軽減する、緩和する','被害・リスク・悪影響を小さくする。','The city planted trees to ____ the impact of extreme heat.',['mitigate','intensify','derail','provoke'],'mitigate risk / damage / impact が頻出です。'],
['obdurate','/ˈɑːbdərət/','頑固な、強情な','説得されても考えを変えない。','Despite overwhelming evidence, the board remained ____ in its refusal to change course.',['obdurate','pliable','tentative','cordial'],'obdurate refusal / resistance と相性が良いです。'],
['perfunctory','/pərˈfʌŋktəri/','おざなりの、形式的な','義務的で熱意や注意がない。','The manager gave a ____ apology that satisfied no one.',['perfunctory','heartfelt','meticulous','radiant'],'perfunctory apology / inspection / response が頻出です。'],
['proliferate','/prəˈlɪfəreɪt/','急増する、拡散する','数や種類が急速に増える。','Misinformation can ____ rapidly on social media platforms.',['proliferate','abate','stagnate','subside'],'情報、武器、細胞などが増殖・拡散する文脈で使います。'],
['recalcitrant','/rɪˈkælsɪtrənt/','反抗的な、扱いにくい','規則や指示に従おうとしない。','The teacher struggled to manage a ____ student who ignored every instruction.',['recalcitrant','compliant','docile','amiable'],'recalcitrant student / employee / regime など。'],
['repudiate','/rɪˈpjuːdieɪt/','拒絶する、否認する','主張・契約・関係などを公式に退ける。','The senator moved quickly to ____ the controversial remarks.',['repudiate','endorse','ratify','cherish'],'repudiate a claim / allegation / remark が重要です。'],
['resilient','/rɪˈzɪliənt/','回復力のある','困難から立ち直る力がある。','Small businesses proved surprisingly ____ after the natural disaster.',['resilient','brittle','lethargic','obsolete'],'resilient economy / community / system で使います。'],
['scrutinize','/ˈskruːtənaɪz/','精査する','細部まで注意深く調べる。','Auditors were asked to ____ the company’s financial records.',['scrutinize','neglect','fabricate','appease'],'scrutinize records / policy / evidence が頻出です。'],
['tenuous','/ˈtenjuəs/','根拠の薄い、弱い','関係・主張・証拠が弱く不確か。','The link between the policy and the economic recovery remains ____.',['tenuous','robust','explicit','inevitable'],'tenuous link / evidence / claim が重要です。'],
['ubiquitous','/juːˈbɪkwɪtəs/','至る所にある','どこにでも存在する。','Smartphones have become ____ in modern urban life.',['ubiquitous','scarce','archaic','opaque'],'ubiquitous presence / technology などで使います。'],
['vacillate','/ˈvæsəleɪt/','揺れ動く、迷う','決定や意見が行ったり来たりする。','The committee continued to ____ between two competing proposals.',['vacillate','persevere','reconcile','accelerate'],'vacillate between A and B の形が重要です。'],
['vindicate','/ˈvɪndɪkeɪt/','正当性を証明する','疑いを晴らし正しかったと示す。','The final report seemed to ____ her decision to delay the launch.',['vindicate','condemn','belittle','distort'],'decision, claim, person の正当性を証明する時に使います。'],
['wary','/ˈweri/','警戒している','危険や問題に用心している。','Consumers are increasingly ____ of companies that collect excessive personal data.',['wary','oblivious','elated','reckless'],'be wary of ... で「〜を警戒している」。']
].map(function(a){return{w:a[0],p:a[1],m:a[2],j:a[3],s:a[4],o:a[5],u:a[6]}});
var KEY='eiken1_vocab_app_v5';var today=localDate();var state={date:'',questions:[],answers:{},graded:false,score:0,stats:{},days:{},history:{},card:0,reveal:false};
function $(id){return document.getElementById(id)}function localDate(){var d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}function load(){try{var raw=localStorage.getItem(KEY);if(raw)state=Object.assign(state,JSON.parse(raw));}catch(e){}if(!state.stats)state.stats={};if(!state.days)state.days={};if(!state.history)state.history={};WORDS.forEach(function(x){if(!state.stats[x.w])state.stats[x.w]={seen:0,correct:0,wrong:0,known:false,due:'2000-01-01',level:0}})}function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){toast('保存できませんでした')}}function hash(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}return h>>>0}function rng(seed){var x=seed||123456789;return function(){x^=x<<13;x^=x>>>17;x^=x<<5;return((x>>>0)/4294967296)}}function shuffle(a,seed){var r=rng(seed);a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(r()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}function addDays(d,n){var x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}function speak(word){try{if(!('speechSynthesis'in window)){toast('このブラウザでは音声再生に非対応です');return}speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=.82;speechSynthesis.speak(u)}catch(e){toast('音声を再生できませんでした')}}function schedule(word,ok){var s=state.stats[word];s.seen++;if(ok){s.correct++;s.level=Math.min(5,(s.level||0)+1);var gaps=[1,2,4,7,14,30];s.due=addDays(today,gaps[s.level]||30);if(s.level>=4)s.known=true}else{s.wrong++;s.level=0;s.known=false;s.due=addDays(today,1)}}
function generate(force){load();today=localDate();if(!force&&state.date===today&&state.questions&&state.questions.length){render();return}state.date=today;state.answers={};state.graded=false;state.score=0;state.card=0;state.reveal=false;state.days[today]=true;var recentDates=Object.keys(state.history||{}).sort().slice(-5);var recent={};recentDates.forEach(function(d){(state.history[d]||[]).forEach(function(w){recent[w]=true})});var due=WORDS.filter(function(x){var st=state.stats[x.w];return !st.known&&(st.due<=today||st.wrong>0)});var rest=WORDS.filter(function(x){return due.indexOf(x)<0});due=shuffle(due,hash(today+'due')).sort(function(a,b){var A=state.stats[a.w],B=state.stats[b.w];return(B.wrong-A.wrong)||(A.level-B.level)});rest=shuffle(rest,hash(today+'new'));var pool=due.filter(function(x){return!recent[x.w]}).concat(rest.filter(function(x){return!recent[x.w]}),due.filter(function(x){return recent[x.w]}),rest.filter(function(x){return recent[x.w]}));state.questions=pool.slice(0,10).map(function(x){return x.w});state.history[today]=state.questions;save();render();toast(force?'10問を再生成しました':'今日の10問を作成しました')}
function currentWords(){return(state.questions||[]).map(function(w){return WORDS.find(function(x){return x.w===w})}).filter(Boolean)}function render(){renderStats();renderQuiz();renderCard();renderWords()}function renderStats(){var words=currentWords();$('score').textContent=(state.score||0)+'/'+(words.length||10);$('days').textContent=Object.keys(state.days||{}).length;$('known').textContent=Object.keys(state.stats).filter(function(w){return state.stats[w].known}).length;$('due').textContent=WORDS.filter(function(x){return state.stats[x.w].due<=today&&!state.stats[x.w].known}).length;$('bar').style.width=((state.score||0)/10*100)+'%';$('status').textContent=state.date?state.date+' の10問を表示中です。':'「今日の10問」を押してください。'}function renderQuiz(){var box=$('quizBox'),words=currentWords();if(!words.length){box.innerHTML='<p>「今日の10問」を押してください。</p>';return}box.innerHTML=words.map(function(x,i){var opts=shuffle(x.o,hash(today+x.w));return '<div class="q" data-word="'+x.w+'"><div class="meta">Question '+(i+1)+'</div><div class="sentence">'+x.s+'</div>'+opts.map(function(o){var cls='choice';if(state.answers[x.w]===o)cls+=' selected';if(state.graded&&o===x.w)cls+=' correct';if(state.graded&&state.answers[x.w]===o&&o!==x.w)cls+=' wrong';return '<button class="'+cls+'" data-choice="'+o+'">'+o+'</button>'}).join('')+'<div class="explain '+(state.graded?'show':'')+'"><b>'+x.w+'</b> <span class="small">'+x.p+'</span> <button class="speak" data-speak="'+x.w+'" type="button">🔊</button><br>'+x.m+'<br>'+x.j+'<br><b>用法：</b>'+x.u+'</div></div>'}).join('');box.querySelectorAll('.choice').forEach(function(b){b.addEventListener('click',function(){if(state.graded)return;var q=b.closest('.q');state.answers[q.getAttribute('data-word')]=b.getAttribute('data-choice');save();renderQuiz()})});box.querySelectorAll('[data-speak]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();speak(b.getAttribute('data-speak'))})})}function grade(){var words=currentWords();if(!words.length)r
